<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>晴枝 · 花园写真预览</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #20231f;
      background: #f7f5ef;
      line-height: 1.65;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 42px 20px 64px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .lead {
      max-width: 720px;
      margin: 0 0 28px;
      font-size: 17px;
      color: #4d5549;
    }
    section {
      margin-top: 34px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    figure {
      margin: 0;
      background: #fffdf8;
      border: 1px solid #e2ddd1;
      border-radius: 8px;
      overflow: hidden;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
    }
    figcaption {
      padding: 12px 14px 14px;
      color: #596054;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    @media (max-width: 720px) {
      h1 { font-size: 28px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>晴枝 · 花园写真预览</h1>
    <p class="lead">一个春末初夏花园里的成年东亚女性角色。她不是悲伤氛围，也不是普通甜妹，而是明亮、松弛、清醒、有生命力，像刚刚重新喜欢上这个世界。</p>

    <section>
      <h2>核心锚点</h2>
      <figure>
        <img src="images/01_晴枝_核心锚点.png" alt="晴枝核心锚点图">
        <figcaption>当前最喜欢、最能代表晴枝气质的一张：发丝、叶影、花前景和轻微笑意共同定义了她的第一印象。</figcaption>
      </figure>
    </section>

    <section>
      <h2>稳定性测试</h2>
      <figure>
        <img src="images/02_晴枝_12图联系表.png" alt="晴枝 R3 12 图联系表">
        <figcaption>同一套 prompt + moodboard 连跑三组后的结果，说明角色面孔、花园光影和整体审美已经比较稳定。</figcaption>
      </figure>
    </section>

    <section>
      <h2>备选方向</h2>
      <div class="grid">
        <figure>
          <img src="images/03_晴枝_技术备用_G2-2.png" alt="晴枝技术备用图">
          <figcaption>技术备用：脸部更清楚，适合后续做锁脸扩展。</figcaption>
        </figure>
        <figure>
          <img src="images/04_晴枝_情绪备选_G3-3.png" alt="晴枝情绪备选图">
          <figcaption>情绪备选：凝视张力更强，但冷感更重，适合做晴枝的阴影面。</figcaption>
        </figure>
      </div>
    </section>
  </main>
</body>
</html>
